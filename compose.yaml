services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agregator_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agregator_service"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  test:
    build: .
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      EVENTS_PROVIDER_BASE_URL: http://provider.test
      HOME: /app
      UV_CACHE_DIR: /app/.cache/uv
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command: ["alembic upgrade head && uv sync --group dev && uv run pytest -q"]
    profiles:
      - test

volumes:
  postgres_data: